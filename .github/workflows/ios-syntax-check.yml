name: iOS Plugin Compile Check

# Edit-time compile coverage for the iOS plugin sources. iOS code only ever
# compiles when a consumer builds an iOS player from Unity, so structural
# typos in `.mm` files (the kind that come from cross-file refactors —
# renaming a class, moving a property, mistyping a category) hide for days
# until somebody actually runs an Xcode build. This workflow compiles every
# `.mm` in `package/Plugins/iOS/` on every PR + push that touches that
# tree, using the real iOS SDK on a GitHub-hosted macOS runner. Output is
# discarded; we just want "does every translation unit compile?".
#
# Cost: macOS runners are 10x against private-repo minutes, but this is
# ~30s per run — well under the noise floor of normal SDK CI.

on:
  push:
    branches: [main]
    paths:
      - 'package/Plugins/iOS/**'
      - '.github/workflows/ios-syntax-check.yml'
  pull_request:
    paths:
      - 'package/Plugins/iOS/**'
      - '.github/workflows/ios-syntax-check.yml'
  workflow_dispatch: {}

concurrency:
  group: ios-syntax-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-check:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcrun --show-sdk-path --sdk iphoneos
          xcrun clang --version

      - name: Compile every .mm
        working-directory: package/Plugins/iOS
        # Full per-file compile (not `-fsyntax-only`) — same cost on a
        # macOS runner, but the codegen pass catches per-file errors that
        # syntax-check passes through (ARC ownership generation, certain
        # template instantiations, codegen-time type checks). Output is
        # discarded; we don't link or ship a binary, this is just a "does
        # every translation unit compile?" gate. Linker errors (undefined
        # symbols across files) still hide here — Unity does the link.
        #
        # `-arch arm64` matches the on-device architecture; the simulator
        # SDK would also parse but iOS-arm64 is what ships, so check that.
        # `-fobjc-arc` mirrors Unity's iOS player setting (ARC enabled).
        # `-fmodules` lets `@import Foo` work; we mostly use `#import`.
        # `-w` silences all warnings — we only want hard errors here, the
        # game's actual Xcode build is where warnings get triaged.
        # `-x objective-c++` forces Obj-C++ mode (the .mm extension does
        # this automatically, but being explicit keeps the invocation
        # equivalent if we ever lint .m files too).
        run: |
          set -u
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          FAILED=0
          FAILED_FILES=""
          shopt -s nullglob
          for f in *.mm; do
            echo "::group::$f"
            if ! xcrun clang \
                -c -o /dev/null \
                -arch arm64 \
                -isysroot "$SDK" \
                -fobjc-arc \
                -fmodules \
                -std=gnu++17 \
                -x objective-c++ \
                -w \
                -I . \
                "$f"; then
              FAILED=$((FAILED + 1))
              FAILED_FILES="$FAILED_FILES $f"
            fi
            echo "::endgroup::"
          done
          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "::error::iOS compile check failed for $FAILED file(s):$FAILED_FILES"
            exit 1
          fi
          echo "iOS compile check: all .mm files clean."
