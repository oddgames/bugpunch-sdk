name: Build iOS xcframework

# Rebuilds sdk/package/Plugins/iOS/Bugpunch.xcframework whenever the iOS
# native source under sdk/ios-src/ changes, then commits the rebuilt
# binary back to the branch. Mirrors android-aar.yml — game developers
# consuming the UPM package never need Xcode locally; CI keeps the
# committed xcframework in sync with ios-src/.
#
# Replaces the older ios-syntax-check.yml — building the xcframework
# is a strictly stricter compile gate (it has to actually link).

on:
  push:
    branches: [main]
    paths:
      - 'ios-src/**'
      - '.github/workflows/ios-xcframework.yml'
  pull_request:
    paths:
      - 'ios-src/**'
      - '.github/workflows/ios-xcframework.yml'
  workflow_dispatch: {}

concurrency:
  group: ios-xcframework-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write   # needed to push the rebuilt xcframework back

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so auto-commit can push back on push events.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show toolchain
        run: |
          xcrun --show-sdk-path --sdk iphoneos
          xcrun clang --version
          xcrun xcodebuild -version

      - name: Build xcframework
        working-directory: ios-src/Bugpunch
        # Invoke via `bash` because git on Windows doesn't preserve the
        # executable bit, so the script's +x is gone by the time it
        # lands on the runner.
        run: bash build-xcframework.sh

      - name: Show output
        run: |
          ls -la package/Plugins/iOS/Bugpunch.xcframework
          find package/Plugins/iOS/Bugpunch.xcframework -type f | head -20

      - name: Upload xcframework artifact (always, even on PRs from forks)
        uses: actions/upload-artifact@v4
        with:
          name: Bugpunch-xcframework
          path: package/Plugins/iOS/Bugpunch.xcframework
          retention-days: 30

      - name: Commit rebuilt xcframework
        # Only on same-repo events (push / same-repo PR). Fork PRs can't push
        # back; the artifact upload above is their paper trail.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'ci: rebuild iOS xcframework'
          file_pattern: 'package/Plugins/iOS/Bugpunch.xcframework'
          commit_user_name: 'bugpunch-ci'
          commit_user_email: 'ci@oddgames.com.au'
